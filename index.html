<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薬の早見表</title>
  <meta name="description" content="睡眠薬・抗不安薬・鎮痛薬など多領域の薬剤を、作用機序・効能・エビデンス・妊娠授乳・等価換算で横断比較できる学習用早見表。">
  <meta name="theme-color" content="#2563eb">
  <meta name="color-scheme" content="light">
  <!-- ホーム画面に追加（iOS） -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="薬の早見表">
  <!-- 絵文字SVGファビコン（外部画像ファイル不要） -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💊</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💊</text></svg>">
  <!-- OGP（共有時の見栄え） -->
  <meta property="og:title" content="薬の早見表">
  <meta property="og:description" content="多領域の薬剤を作用機序・効能・エビデンス・妊娠授乳・等価換算で横断比較できる学習用早見表。">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>💊 薬の早見表</h1>
    <p class="subtitle">精神系・神経系・生活習慣病薬の包括的比較 ｜ 作用機序・効能・エビデンスの学習用早見表</p>
    <button class="calc-open-btn" id="calc-open" type="button">🧮 等価換算計算機</button>
  </header>

  <main class="main">

    <!-- ドメイン絞り込みフィルター -->
    <div class="domain-filter" id="domain-filter">
      <button class="filter-btn active" data-group="all">選択しない</button>
      <button class="filter-btn" data-group="internal">内科系</button>
      <button class="filter-btn" data-group="surgical">外科系（感覚器）</button>
      <button class="filter-btn" data-group="infect">感染症系</button>
    </div>

    <!-- ドメインタブ（大分類） -->
    <div class="domain-tabs">
      <button class="domain-btn active" data-domain="sleep">🧠 精神系</button>
      <button class="domain-btn" data-domain="pain">🩹 神経系</button>
      <button class="domain-btn" data-domain="ortho">🦴 整形外科</button>
      <button class="domain-btn" data-domain="lifestyle">🔬 代謝系</button>
      <button class="domain-btn" data-domain="diabetes">🩸 糖尿病</button>
      <button class="domain-btn" data-domain="endocrine">🧬 内分泌</button>
      <button class="domain-btn" data-domain="urology">🫧 泌尿器</button>
      <button class="domain-btn" data-domain="renal">💧 腎臓・利尿薬</button>
      <button class="domain-btn" data-domain="ophthalmo">👁 眼科</button>
      <button class="domain-btn" data-domain="derma">🧴 皮膚科</button>
      <button class="domain-btn" data-domain="gyneco">🌸 産婦人科</button>
      <button class="domain-btn" data-domain="nutrition">🥛 栄養・ビタミン</button>
      <button class="domain-btn" data-domain="steroid">💊 ステロイド</button>
      <button class="domain-btn" data-domain="immune">🛡 免疫系</button>
      <button class="domain-btn" data-domain="blood">🩸 血液・凝固</button>
      <button class="domain-btn" data-domain="oncology">🎗 がん支持療法</button>
      <button class="domain-btn" data-domain="arrhythmia">❤ 不整脈</button>
      <button class="domain-btn" data-domain="hf">🫀 高血圧・心不全</button>
      <button class="domain-btn" data-domain="gi">🫃 消化器系</button>
      <button class="domain-btn" data-domain="liver">🧡 肝臓疾患</button>
      <button class="domain-btn" data-domain="allergy">🌸 抗アレルギー</button>
      <button class="domain-btn" data-domain="respiratory">🫁 呼吸器</button>
      <button class="domain-btn" data-domain="ent">👂 耳鼻科</button>
      <button class="domain-btn" data-domain="antibiotics">🧫 抗菌薬</button>
      <button class="domain-btn" data-domain="antifungals">🍄 抗真菌薬</button>
      <button class="domain-btn" data-domain="antiviral">🦠 抗ウイルス・原虫薬</button>
      <button class="domain-btn" data-domain="antiseptic">🧪 消毒薬</button>
    </div>

    <!-- 疾患別 / 作用機序別 グループトグル（不整脈・心不全のみ表示） -->
    <div id="cat-group-area"></div>

    <!-- カテゴリタブ（小分類・JSで生成） -->
    <div class="tabs" id="cat-tabs" role="tablist"></div>

    <!-- 検索 -->
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="search" id="search" placeholder="薬品名・系統名・キーワードで検索…" autocomplete="off">
    </div>

    <!-- 件数・並び替え -->
    <div class="meta-row">
      <p class="result-info" id="result-info" aria-live="polite"></p>
      <div class="meta-row-right">
        <button class="compare-toggle-btn" id="compare-toggle" aria-pressed="false">⚖ 比較</button>
        <div class="sort-wrap">
          <label for="sort-select">並び替え：</label>
          <select id="sort-select">
            <option value="default">デフォルト</option>
            <option value="star-desc">効果スコア（高い順）</option>
            <option value="star-asc">効果スコア（低い順）</option>
            <option value="nnt-asc">NNT（小さい順）</option>
            <option value="rank-first">効果スコア（高い順）★</option>
            <option value="name-asc">名前（50音順）</option>
          </select>
        </div>
      </div>
    </div>

    <!-- テーブル -->
    <div id="cards"></div>

  </main>

  <!-- 比較バー -->
  <div class="compare-bar" id="compare-bar" hidden>
    <div class="compare-bar-chips" id="compare-bar-chips"></div>
    <button class="compare-go-btn" id="compare-go-btn">比較する（<span id="compare-count">0</span>）</button>
    <button class="compare-clear-btn" id="compare-clear-btn">✕</button>
  </div>

  <footer class="disclaimer" role="contentinfo">
    <p>
      <strong>⚕ 免責事項：</strong>
      掲載数値は参考値です。治療・服薬の最終判断は必ず<strong>医師・薬剤師</strong>にご相談ください。
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
